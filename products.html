<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products | Spectrum Crafts</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

header h2{
color:#D4AF37;
}

.container{
width:95%;
max-width:1200px;
margin:20px auto;
}

.add-product{

background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:25px;

}

.add-product input,
.add-product textarea,
.add-product select{

width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;

}

.add-product button{

width:100%;
padding:15px;
margin-top:15px;
background:#0B7A5C;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}

.products{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}

.card{

background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);

}

.card img{

width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
background:#ddd;

}

.card h3{

margin-top:15px;
color:#0B7A5C;

}

.price{

font-size:20px;
font-weight:bold;
margin:10px 0;

}

.buy{

display:block;
text-align:center;
padding:12px;
background:#D4AF37;
text-decoration:none;
color:#111;
border-radius:6px;
font-weight:bold;

}

</style>

</head>

<body>

<header>

<h2>Spectrum Crafts</h2>

<p>Product Management</p>

</header>

<div class="container">

<div class="add-product">

<h3>Add Product</h3>

<input type="text" placeholder="Product Name">

<select>

<option>Gift</option>
<option>Resin Art</option>
<option>Craft</option>
<option>Calligraphy</option>
<option>Bouquet</option>

</select>

<input type="number" placeholder="Price">

<input type="file">

<textarea rows="4" placeholder="Description"></textarea>

<button>

Add Product

</button>

</div>

<div class="products">

<div class="card">

<img src="images/product1.jpg">

<h3>Gift Hamper</h3>

<p class="price">₹999</p>

<a href="#" class="buy">

Order Now

</a>

</div>

<div class="card">

<img src="images/product2.jpg">

<h3>Resin Gift</h3>

<p class="price">₹650</p>

<a href="#" class="buy">

Order Now

</a>

</div>

<div class="card">

<img src="images/product3.jpg">

<h3>Calligraphy Frame</h3>

<p class="price">₹1200</p>

<a href="#" class="buy">

Order Now

</a>

</div>

</div>

</div>

</body>

</html>
