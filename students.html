<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Students | Spectrum Crafts</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:18px;
text-align:center;
}

header h2{
color:#D4AF37;
}

.container{
width:95%;
max-width:1100px;
margin:20px auto;
}

.search{

margin-bottom:20px;

}

.search input{

width:100%;

padding:12px;

border:1px solid #ccc;

border-radius:8px;

}

table{

width:100%;

background:white;

border-collapse:collapse;

box-shadow:0 5px 15px rgba(0,0,0,.1);

}

th{

background:#0B7A5C;

color:white;

padding:15px;

}

td{

padding:12px;

text-align:center;

border-bottom:1px solid #ddd;

}

.action{

padding:8px 15px;

background:#D4AF37;

border:none;

border-radius:5px;

cursor:pointer;

}

footer{

text-align:center;

padding:20px;

color:#666;

}

</style>

</head>

<body>

<header>

<h2>Spectrum Crafts</h2>

<p>Student Management</p>

</header>

<div class="container">

<div class="search">

type="text"
placeholder="Search Student">

</div>

<th>Name</th>

<th>Course</th>

<th>Mobile</th>

</tr>

<td>SC25002</td>

</div>

</html>
