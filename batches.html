<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Batch Management | Spectrum Crafts</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
text-align:center;
padding:20px;
}

header h2{
color:#D4AF37;
}

.container{
width:95%;
max-width:1000px;
margin:20px auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:20px;
}

input,
select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:15px;
background:#0B7A5C;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#0B7A5C;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

</style>

</head>

<body>

<header>

<h2>Spectrum Crafts</h2>

<p>Batch Management</p>

</header>

<div class="container">

<div class="card">

<h3>Create New Batch</h3>

<input type="text" placeholder="Batch Name">

<select>

<option>Select Course</option>

<option>Mehendi</option>

<option>Embroidery</option>

<option>Crafts</option>

<option>Creative Combo Course</option>

</select>

<input type="date">

<button>Create Batch</button>

</div>

<div class="card">

<h3>Available Batches</h3>

<table>

<tr>

<th>Batch</th>

<th>Course</th>

<th>Students</th>

<th>Status</th>

</tr>

<tr>

<td>Batch 1</td>

<td>Creative Combo Course</td>

<td>25</td>

<td>Running</td>

</tr>

<tr>

<td>Batch 2</td>

<td>Mehendi</td>

<td>18</td>

<td>Running</td>

</tr>

</table>

</div>

</div>

</body>

</html>
