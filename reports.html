<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports | Spectrum Crafts</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

header h2{
color:#D4AF37;
}

.container{
width:95%;
max-width:1100px;
margin:25px auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card h3{
color:#0B7A5C;
margin-bottom:10px;
}

.number{
font-size:40px;
font-weight:bold;
color:#111;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<h2>Spectrum Crafts</h2>

<p>Reports Dashboard</p>

</header>

<div class="container">

<div class="grid">

<div class="card">

<h3>Total Students</h3>

<div class="number">120</div>

</div>

<div class="card">

<h3>Active Courses</h3>

<div class="number">4</div>

</div>

<div class="card">

<h3>Certificates Issued</h3>

<div class="number">85</div>

</div>

<div class="card">

<h3>Products</h3>

<div class="number">35</div>

</div>

<div class="card">

<h3>Attendance Today</h3>

<div class="number">42</div>

</div>

<div class="card">

<h3>Pending Admissions</h3>

<div class="number">8</div>

</div>

</div>

</div>

</body>
</html>
