<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Issue | Spectrum Crafts</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
text-align:center;
padding:20px;
}

header h2{
color:#D4AF37;
}

.container{
width:95%;
max-width:900px;
margin:20px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,
select{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:6px;
}

button{

width:100%;
padding:15px;
margin-top:20px;
background:#0B7A5C;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;

}

.preview{

margin-top:30px;
padding:20px;
border:2px dashed #D4AF37;
text-align:center;
background:#fafafa;

}

.preview h2{

color:#0B7A5C;

margin-bottom:10px;

}

.preview p{

margin:8px 0;

}

</style>

</head>

<body>

<header>

<h2>Spectrum Crafts</h2>

<p>Certificate Issue</p>

</header>

<div class="container">

<label>Select Student</label>

<select>

<option>SC25001 - Student Name</option>

<option>SC25002 - Student Name</option>

</select>

<label>Course</label>

<select>

<option>Creative Combo Course</option>

<option>Mehendi</option>

<option>Embroidery</option>

<option>Crafts</option>

</select>

<label>Certificate Number</label>

<input
type="text"
placeholder="SC-CERT-0001">

<label>Place</label>

<input
type="text"
placeholder="Padne">

<label>Date</label>

<input
type="date">

<button>

Generate Certificate

</button>

<div class="preview">

<h2>Certificate Preview</h2>

<p><b>Student :</b> Student Name</p>

<p><b>Course :</b> Creative Combo Course</p>

<p><b>Certificate No :</b> SC-CERT-0001</p>

<p><b>Place :</b> Padne</p>

<p><b>Date :</b> 10-07-2026</p>

<p>

Your original certificate design will be used here.
Only the student details will change.

</p>

</div>

</div>

</body>
</html>
