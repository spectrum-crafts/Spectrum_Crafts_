<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fees Management | Spectrum Crafts</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

header h2{
color:#D4AF37;
}

.container{
width:95%;
max-width:1100px;
margin:20px auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#0B7A5C;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:15px;
width:100%;
padding:15px;
background:#0B7A5C;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.status-paid{
color:green;
font-weight:bold;
}

.status-pending{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<h2>Spectrum Crafts</h2>

<p>Fees Management</p>

</header>

<div class="container">

<div class="card">

<h3>Receive Fee</h3>

<input type="text" placeholder="Student ID">

<input type="text" placeholder="Student Name">

<select>

<option>Select Course</option>

<option>Mehendi</option>

<option>Embroidery</option>

<option>Crafts</option>

<option>Creative Combo Course</option>

</select>

<input type="number" placeholder="Amount">

<input type="date">

<button>

Save Payment

</button>

</div>

<div class="card">

<h3>Payment Records</h3>

<table>

<tr>

<th>ID</th>

<th>Name</th>

<th>Course</th>

<th>Amount</th>

<th>Status</th>

</tr>

<tr>

<td>SC25001</td>

<td>Student Name</td>

<td>Creative Combo Course</td>

<td>₹5000</td>

<td class="status-paid">Paid</td>

</tr>

<tr>

<td>SC25002</td>

<td>Student Name</td>

<td>Mehendi</td>

<td>₹2000</td>

<td class="status-pending">Pending</td>

</tr>

</table>

</div>

</div>

</body>
</html>
