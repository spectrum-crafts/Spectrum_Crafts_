<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notices | Spectrum Crafts</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
text-align:center;
padding:20px;
}

header h2{
color:#D4AF37;
}

.container{
width:95%;
max-width:900px;
margin:25px auto;
}

.add{

background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:25px;

}

.add input,
.add textarea{

width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;

}

.add button{

width:100%;
padding:15px;
margin-top:15px;
background:#0B7A5C;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}

.notice{

background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:20px;

}

.notice h3{

color:#0B7A5C;

margin-bottom:10px;

}

.date{

font-size:14px;

color:#777;

margin-bottom:10px;

}

</style>

</head>

<body>

<header>

<h2>Spectrum Crafts</h2>

<p>Notice Board</p>

</header>

<div class="container">

<div class="add">

<h3>Publish New Notice</h3>

<input
type="text"
placeholder="Notice Title">

<textarea
rows="5"
placeholder="Write Notice Here..."></textarea>

<button>

Publish Notice

</button>

</div>

<div class="notice">

<h3>Welcome Students</h3>

<p class="date">

01 July 2026

</p>

<p>

Welcome to Spectrum Crafts.
We wish you all the very best.

</p>

</div>

<div class="notice">

<h3>Creative Combo Course</h3>

<p class="date">

05 July 2026

</p>

<p>

New batch admission is now open.

</p>

</div>

</div>

</body>

</html>
