<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Crafts</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#f7f7f7;
color:#222;
}

header{
background:#111;
padding:15px 8%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:28px;
font-weight:bold;
color:#D4AF37;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:20px;
font-size:15px;
transition:.3s;
}

nav a:hover{
color:#D4AF37;
}

.hero{

height:90vh;

background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url("images/hero.jpg") center/cover;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

color:white;

padding:20px;

}

.hero h1{

font-size:55px;

margin-bottom:20px;

}

.hero p{

font-size:20px;

margin-bottom:30px;

}

.btn{

display:inline-block;

background:#D4AF37;

padding:14px 35px;

border-radius:30px;

text-decoration:none;

color:#111;

font-weight:600;

transition:.3s;

}

.btn:hover{

background:#0B7A5C;

color:white;

}

section{

padding:80px 8%;

}

.title{

text-align:center;

font-size:35px;

margin-bottom:15px;

color:#111;

}

.subtitle{

text-align:center;

color:#666;

margin-bottom:40px;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

gap:25px;

}

.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 8px 20px rgba(0,0,0,.08);

text-align:center;

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

}

.card h3{

color:#0B7A5C;

margin-bottom:10px;

}

.admission{

background:white;

padding:30px;

border-radius:15px;

box-shadow:0 8px 20px rgba(0,0,0,.08);

max-width:700px;

margin:auto;

}

.admission input,
.admission textarea,
.admission select{

width:100%;

padding:14px;

margin-top:8px;

margin-bottom:18px;

border:1px solid #ddd;

border-radius:8px;

}

.admission button{

background:#0B7A5C;

color:white;

border:none;

padding:15px;

width:100%;

border-radius:8px;

font-size:17px;

cursor:pointer;

}

footer{

background:#111;

color:white;

text-align:center;

padding:40px;

margin-top:50px;

}

.whatsapp{

position:fixed;

right:20px;

bottom:20px;

background:#25D366;

color:white;

padding:15px 20px;

border-radius:50px;

text-decoration:none;

font-weight:bold;

}

@media(max-width:768px){

header{

flex-direction:column;

}

nav{

margin-top:15px;

}

.hero h1{

font-size:36px;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

Spectrum Crafts

</div>

<nav>

<a href="#about">About</a>

<a href="#courses">Courses</a>

<a href="#admission">Admission</a>

<a href="#products">Products</a>

<a href="#gallery">Gallery</a>

<a href="#contact">Contact</a>

<a href="login.html">Login</a>

</nav>

</header>

<section class="hero">

<div>

<h1>Crafting Skills.<br>Creating Futures.</h1>

<p>

Professional Creative Academy & Handmade Gifts

</p>

<a href="#admission" class="btn">

Join Now

</a>

</div>

</section>
