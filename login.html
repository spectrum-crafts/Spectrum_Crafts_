<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Spectrum Crafts</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0B7A5C;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

background:white;

padding:35px;

width:350px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.2);

text-align:center;

}

h2{

color:#0B7A5C;

margin-bottom:20px;

}

input{

width:100%;

padding:14px;

margin:10px 0;

border:1px solid #ddd;

border-radius:8px;

}

button{

width:100%;

padding:15px;

background:#D4AF37;

border:none;

border-radius:8px;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#111;

color:white;

}

.small{

margin-top:15px;

font-size:14px;

}

.small a{

color:#0B7A5C;

text-decoration:none;

font-weight:bold;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Spectrum Crafts</h2>

<p>Student & Admin Login</p>

<br>

<form>

<input
type="text"
placeholder="Student ID / Mobile Number"
required>

<input
type="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

<div class="small">

<a href="index.html">

⬅ Back to Home

</a>

</div>

</div>

</body>
</html>
