<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance | Spectrum Crafts</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:18px;
text-align:center;
}

header h2{
color:#D4AF37;
}

.container{
width:95%;
max-width:1100px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#0B7A5C;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

.present{

background:#28a745;

color:white;

border:none;

padding:8px 15px;

border-radius:5px;

cursor:pointer;

}

.absent{

background:#dc3545;

color:white;

border:none;

padding:8px 15px;

border-radius:5px;

cursor:pointer;

}

.save{

margin-top:20px;

width:100%;

padding:15px;

background:#0B7A5C;

color:white;

border:none;

border-radius:8px;

font-size:17px;

cursor:pointer;

}

</style>

</head>

<body>

<header>

<h2>Spectrum Crafts</h2>

<p>Student Attendance</p>

</header>

<div class="container">

<h3>Date : ____________</h3>

<table>

<tr>

<th>Student ID</th>

<th>Name</th>

<th>Course</th>

<th>Attendance</th>

</tr>

<tr>

<td>SC25001</td>

<td>Student Name</td>

<td>Creative Combo Course</td>

<td>

<button class="present">Present</button>

<button class="absent">Absent</button>

</td>

</tr>

<tr>

<td>SC25002</td>

<td>Student Name</td>

<td>Mehendi</td>

<td>

<button class="present">Present</button>

<button class="absent">Absent</button>

</td>

</tr>

</table>

<button class="save">

Save Attendance

</button>

</div>

</body>

</html>
