<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student ID Card | Spectrum Crafts</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
}

header{
background:#111;
color:#fff;
text-align:center;
padding:20px;
}

header h2{
color:#D4AF37;
}

.container{
width:95%;
max-width:900px;
margin:25px auto;
}

.form{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:25px;
}

.form input,
.form select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:15px;
background:#0B7A5C;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.idcard{

width:350px;
margin:30px auto;
background:white;
border:3px solid #0B7A5C;
border-radius:15px;
padding:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.logo{

font-size:22px;
font-weight:bold;
color:#D4AF37;

}

.photo{

width:100px;
height:100px;
background:#ddd;
border-radius:50%;
margin:20px auto;

}

table{

width:100%;
margin-top:15px;

}

td{

padding:8px;

text-align:left;

}

.footer{

margin-top:20px;
font-size:13px;
color:#666;

}

</style>

</head>

<body>

<header>

<h2>Spectrum Crafts</h2>

<p>Student ID Card Generator</p>

</header>

<div class="container">

<div class="form">

<input type="text" placeholder="Student ID">

<input type="text" placeholder="Student Name">

<select>

<option>Select Course</option>

<option>Mehendi</option>

<option>Embroidery</option>

<option>Crafts</option>

<option>Creative Combo Course</option>

</select>

<input type="file">

<button>

Generate ID Card

</button>

</div>

<div class="idcard">

<div class="logo">

Spectrum Crafts

</div>

<p>Student Identity Card</p>

<div class="photo"></div>

<table>

<tr>

<td><b>ID</b></td>

<td>SC25001</td>

</tr>

<tr>

<td><b>Name</b></td>

<td>Student Name</td>

</tr>

<tr>

<td><b>Course</b></td>

<td>Creative Combo Course</td>

</tr>

<tr>

<td><b>Mobile</b></td>

<td>9778038199</td>

</tr>

</table>

<div class="footer">

Designed by SPECTRUM DESIGN

</div>

</div>

</div>

</body>

</html>
